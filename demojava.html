<!DOCTYPE html>
<html lang="en">
    <title>Java Script Types</title>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        function internaljs(){
            alert("This is the internal javaScript by the output of alert");
        }
    </script>
</head>

<body>
    <script src="demojavascript.js"></script>
    <h3>Internal java Script</h3>
    <button onclick="internaljs()">internal JS</button>
    <button onclick="alertIn()"> alert External Js</button>
    <button onclick="ConsoleIn()">console External Js</button>
    <button onclick="documentIn()">document External Js</button>
    <button onclick="documentGetIn()">document get External Js</button>
</body>
</html>
