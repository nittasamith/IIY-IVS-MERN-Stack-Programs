<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="calculate()">Factorial</button>
    <script>
        function factorial(a){
            if(a==0 || a==1){
                return 1;
            }
            else{
                return a*factorial(a-1);
            }
        }
        function fibonacci(a){
            if(a==0){
                return 0;
            }
            else if(a==1){
                return 1;
            }
            else{
                return fibonacci(a-1)+fibonacci(a-2);
            }
        }
        function calculate(){
            let a = parseInt(prompt("Enter the range number :"));
            document.write("The factorial of "+a+" is "+factorial(a)+"<br>");
            document.write("The fibonacci of "+a+" is "+fibonacci(a));
        }

    </script>
</body>
</html>
