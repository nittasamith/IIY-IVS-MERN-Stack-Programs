<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        document.write("For Loop");
        document.write("<br>");
        let a = 10;
        for(let i=1;i<=a;i++){
            document.write(i+" ");
        }
        document.write("<br>");
        document.write("<br>");
        document.write("While Loop");
        document.write("<br>");
        let i = 1;
        // While Loop
        while(i<=a){
            document.write(i+" ");
            i++;
        }
        document.write("<br>");
        document.write("<br>");
        document.write("Do-While Loop");
        document.write("<br>");
        // Do-While Loop
        i = 1;
        do{
            document.write(i+" ");
            i++;
        }while(i<=10)

    </script>
</body>
</html>
