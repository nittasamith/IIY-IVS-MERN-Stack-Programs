<!DOCTYPE html>
<html lang="en">
    <title>JS Math and String operations</title>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    
    <h3 align="center">Java Script Pre-Defined functions</h3>
    <p id="result" align="center">
        <script>
            window.alert("Welcome to my world");

            let namei = window.prompt("Enter your name:");

            let uppername = namei.toUpperCase();
            let sizename = namei.length;
            let number = 25;
            let squarename = Math.sqrt(number);
            let powofname = Math.pow(5,2);

          document.getElementById("result").innerHTML=
          " Name :"+namei+"<br>"+
          " UpperCase :"+uppername+"<br>"+
          " NameSize :"+sizename+"<br>"+
          " squareof number :"+squarename+"<br>"+
          " Power of number :"+powofname;
        </script>
    </p>

</body>
</html>
